<!doctype html>
<html lang="de">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Anmelden</title>
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
    />
    <link rel="stylesheet" href="styles/index.css" />
    <link id="stylesheet-myspace" rel="stylesheet" href="styles/myspace.css" />
    <script type="module" src="firebase-init.js"></script>
  </head>
  <body class="login-page">
    <div class="text-center py-5">
      <h1 class="display-4 fw-bold mb-4">
        Willkommen auf<br />Waldemars MySpacePage
      </h1>
    </div>
    <main class="login-center">
      <div class="col-12 col-md-6">
        <div class="card shadow-sm">
          <div class="card-body">
            <p class="mb-3">
              Verwende den Gast-Button, um Waldemars MySpacePage zu entdecken!
            </p>
            <div
              id="message"
              class="alert alert-success d-none"
              role="alert"
            ></div>
            <div
              id="error"
              class="alert alert-danger d-none"
              role="alert"
            ></div>
            <form id="login-form">
              <div class="mb-3">
                <label for="username" class="form-label">Benutzername</label>
                <input
                  id="username"
                  class="form-control"
                  placeholder="Benutzername"
                  required
                />
              </div>
              <div class="mb-3">
                <label for="password" class="form-label">Passwort</label>
                <input
                  id="password"
                  type="password"
                  class="form-control"
                  placeholder="Passwort"
                  required
                />
              </div>
              <button type="submit" class="btn btn-primary w-100">
                Anmelden
              </button>
              <p class="text-center text-muted mt-3 mb-2">oder</p>
              <button
                type="button"
                id="guest-btn"
                class="btn btn-secondary w-100"
              >
                Als Gast besuchen
              </button>
            </form>
          </div>
        </div>
      </div>
    </main>

    <script src="theme.js"></script>
    <script>
      const reservedUsernames = ["wamos05"];

      function getLoginTheme() {
        const savedTheme = localStorage.getItem("siteTheme");
        if (savedTheme) return savedTheme;
        return "dark";
      }

      function isReservedUsername(username) {
        return reservedUsernames.some(
          (reserved) => reserved.toLowerCase() === username.toLowerCase(),
        );
      }

      const loginTheme = getLoginTheme();
      sessionStorage.setItem("loginTheme", loginTheme);

      if (typeof applyTheme === "function") {
        applyTheme(loginTheme, false);
      }

      function getLogoutMessage() {
        const params = new URLSearchParams(window.location.search);
        return params.get("loggedOut");
      }

      const logoutName = getLogoutMessage();
      if (logoutName) {
        const message = document.getElementById("message");
        message.textContent =
          "Du wurdest erfolgreich abgemeldet: " + logoutName;
        message.classList.remove("d-none");
        window.history.replaceState(
          {},
          document.title,
          window.location.pathname,
        );
        setTimeout(() => {
          message.classList.add("d-none");
        }, 10000);
      }

      async function hashPassword(password, salt) {
        const encoder = new TextEncoder();
        const data = encoder.encode(password + salt);
        const hashBuffer = await crypto.subtle.digest("SHA-256", data);
        return Array.from(new Uint8Array(hashBuffer))
          .map((b) => b.toString(16).padStart(2, "0"))
          .join("");
      }

      function generateSalt() {
        const array = new Uint8Array(16);
        crypto.getRandomValues(array);
        return Array.from(array)
          .map((b) => b.toString(16).padStart(2, "0"))
          .join("");
      }

      document
        .getElementById("login-form")
        .addEventListener("submit", async function (event) {
          event.preventDefault();
          const username = document.getElementById("username").value.trim();
          const password = document.getElementById("password").value;
          const error = document.getElementById("error");
          error.classList.add("d-none");

          if (!username || !password) {
            error.textContent = "Bitte Benutzername und Passwort eingeben.";
            error.classList.remove("d-none");
            return;
          }

          if (!window.dbReady) {
            error.textContent =
              "Datenbankverbindung wird aufgebaut. Bitte erneut versuchen.";
            error.classList.remove("d-none");
            return;
          }

          await window.dbReady;
          if (!window.db || !window.dbHelpers) {
            error.textContent =
              "Datenbankverbindung konnte nicht hergestellt werden.";
            error.classList.remove("d-none");
            return;
          }

          const { doc, getDoc, setDoc } = window.dbHelpers;
          const userDocRef = doc(window.db, "users", username);

          try {
            let docSnap = await getDoc(userDocRef);

            if (!docSnap.exists() && username.toLowerCase() === "wamos05") {
              const initialSalt = generateSalt();
              const initialHash = await hashPassword("Starten1", initialSalt);

              await setDoc(userDocRef, {
                username: username,
                isGuest: false,
                theme: "dark",
                salt: initialSalt,
                passwordHash: initialHash,
              });

              docSnap = await getDoc(userDocRef);
            }

            if (!docSnap.exists()) {
              error.textContent = "Benutzername oder Passwort nicht korrekt.";
              error.classList.remove("d-none");
              return;
            }

            const userData = docSnap.data();

            if (!userData.passwordHash || !userData.salt) {
              error.textContent =
                "Dieser Account hat kein Passwort. Bitte als Gast anmelden.";
              error.classList.remove("d-none");
              return;
            }

            const enteredHash = await hashPassword(password, userData.salt);
            if (enteredHash !== userData.passwordHash) {
              error.textContent = "Benutzername oder Passwort nicht korrekt.";
              error.classList.remove("d-none");
              return;
            }

            localStorage.setItem("username", username);
            localStorage.removeItem("isGuest");
            sessionStorage.removeItem("screamPlayed");

            if (userData.theme) {
              localStorage.setItem("siteTheme", userData.theme);
            } else {
              localStorage.setItem("siteTheme", "dark");
            }

            window.location.href = "index.html";
          } catch (err) {
            console.error("Firestore Login Fehler:", err);
            error.textContent =
              "Fehler bei der Authentifizierung mit der Datenbank.";
            error.classList.remove("d-none");
          }
        });

      document
        .getElementById("guest-btn")
        .addEventListener("click", async function () {
          const username = document.getElementById("username").value.trim();
          const error = document.getElementById("error");
          error.classList.add("d-none");

          if (!username) {
            error.textContent = "Bitte gib zuerst einen Namen ein.";
            error.classList.remove("d-none");
            return;
          }

          if (isReservedUsername(username)) {
            error.textContent = "Dieser Benutzername ist bereits vergeben!";
            error.classList.remove("d-none");
            return;
          }

          if (!window.dbReady) {
            error.textContent =
              "Datenbankverbindung wird aufgebaut. Bitte erneut versuchen.";
            error.classList.remove("d-none");
            return;
          }

          await window.dbReady;
          if (!window.db || !window.dbHelpers) {
            error.textContent =
              "Datenbankverbindung konnte nicht hergestellt werden.";
            error.classList.remove("d-none");
            return;
          }

          const { doc, getDoc, setDoc } = window.dbHelpers;
          const userDocRef = doc(window.db, "users", username);

          try {
            const docSnap = await getDoc(userDocRef);
            let userSettings;

            if (docSnap.exists()) {
              userSettings = docSnap.data();
              if (userSettings.passwordHash) {
                error.textContent =
                  "Dieser Benutzername erfordert eine Passwort-Anmeldung!";
                error.classList.remove("d-none");
                return;
              }
            } else {
              userSettings = {
                username: username,
                isGuest: true,
                theme: "dark",
              };
              await setDoc(userDocRef, userSettings);
            }

            localStorage.setItem("username", username);
            localStorage.setItem("isGuest", "true");
            sessionStorage.removeItem("screamPlayed");

            if (userSettings.theme) {
              localStorage.setItem("siteTheme", userSettings.theme);
            } else {
              localStorage.setItem("siteTheme", "dark");
            }

            window.location.href = "index.html";
          } catch (err) {
            console.error("Firestore Guest Login Fehler:", err);
            error.textContent = "Fehler beim Laden des Gast-Profils.";
            error.classList.remove("d-none");
          }
        });
    </script>
  </body>
</html>
